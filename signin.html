<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - TransitOps</title>
    <script>
    // Embedded Shared LocalStorage DB Engine
    const initStorage = () => {
        if (!localStorage.getItem('transitops_db')) {
            const initialData = {
                users: [], // Added explicitly for your registration engine
                vehicles: [
                    { id: "V001", regNo: "VAN-05", name: "Ford Transit Van-05", type: "Van", maxLoad: 500, odometer: 12000, acqCost: 25000, status: "Available" },
                    { id: "V002", regNo: "TRK-01", name: "Volvo Heavy Truck", type: "Truck", maxLoad: 5000, odometer: 45000, acqCost: 85000, status: "In Shop" }
                ],
                drivers: [
                    { id: "D001", name: "Alex Jones", licenseNo: "DL-98765", category: "Heavy", expiry: "2027-12-31", phone: "555-0192", safetyScore: 95, status: "Available" },
                    { id: "D002", name: "Sarah Smith", licenseNo: "DL-43210", category: "Light", expiry: "2024-01-15", phone: "555-0431", safetyScore: 88, status: "Suspended" }
                ],
                trips: [],
                maintenance: [],
                expenses: []
            };
            localStorage.setItem('transitops_db', JSON.stringify(initialData));
        }
    };
    initStorage();

    // These are the missing functions the error complained about!
    window.getDB = function() { 
        return JSON.parse(localStorage.getItem('transitops_db')); 
    };
    window.saveDB = function(data) { 
        localStorage.setItem('transitops_db', JSON.stringify(data)); 
    };
</script>
    <style>
        :root {
            --primary-900: #042C53;
            --primary-800: #0C447C;
            --primary-600: #185FA5;
            --primary-400: #378ADD;
            --primary-50: #E6F1FB;
            --accent: #D85A30;
            --accent-light: #EF9F27;
            --text-dark: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-800) 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .auth-container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-header h1 {
            color: var(--primary-900);
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        .brand-header p {
            color: #64748b;
            margin: 5px 0 0 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--primary-800);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-600);
            box-shadow: 0 0 0 3px var(--primary-50);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--accent-light);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #475569;
        }

        .toggle-text a {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        /* Utility class to visually swap view states */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-header">
            <h1>TransitOps</h1>
            <p id="form-subtitle">Smart Transport Operations Platform</p>
        </div>

        <form id="signInForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
            <div class="toggle-text">
                Don't have an account? <a href="#" id="toSignUp">Create Account</a>
            </div>
        </form>

        <form id="signUpForm" class="hidden">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="regRole">Platform Role</label>
                <select id="regRole" required>
                    <option value="Fleet Manager">Fleet Manager</option>
                    <option value="Driver">Driver</option>
                    <option value="Safety Officer">Safety Officer</option>
                    <option value="Financial Analyst">Financial Analyst</option>
                </select>
            </div>
            <div class="form-group">
                <label for="regPassword">Create Password</label>
                <input type="password" id="regPassword" placeholder="Minimum 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn-submit">Register Account</button>
            <div class="toggle-text">
                Already registered? <a href="#" id="toSignIn">Back to Sign In</a>
            </div>
        </form>
    </div>

    <script>
        // DOM element hooks for view swapping
        const signInForm = document.getElementById('signInForm');
        const signUpForm = document.getElementById('signUpForm');
        const formSubtitle = document.getElementById('form-subtitle');

        // Toggle View Listeners
        document.getElementById('toSignUp').addEventListener('click', (e) => {
            e.preventDefault();
            signInForm.classList.add('hidden');
            signUpForm.classList.remove('hidden');
            formSubtitle.innerText = "Register Your Team Profile";
        });

        document.getElementById('toSignIn').addEventListener('click', (e) => {
            e.preventDefault();
            signUpForm.classList.add('hidden');
            signInForm.classList.remove('hidden');
            formSubtitle.innerText = "Smart Transport Operations Platform";
        });

        // Submitting Registration Logic (Sign Up)
        signUpForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const db = getDB();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const role = document.getElementById('regRole').value;
            const password = document.getElementById('regPassword').value;

            // Business rule validation: Unique system accounts
            if (!db.users) db.users = []; // Handle schema safety if not initialized
            
            if (db.users.some(u => u.email === email)) {
                alert("An account with this email address already exists!");
                return;
            }

            // Save new user profile credentials into the shared database
            db.users.push({ id: 'USR-' + Date.now(), name, email, role, password });
            saveDB(db);

            alert("Account registered successfully! You can now log in.");
            signUpForm.reset();
            // Automatically swap them back to sign in screen
            document.getElementById('toSignIn').click();
        });

        // Submitting Login Verification Logic (Sign In)
        signInForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const db = getDB();
            
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            // Default fallback account for judges to test out seamlessly if database is pristine
            if (email === "admin@transitops.com" && password === "odoo2026") {
                sessionStorage.setItem('currentUser', JSON.stringify({ name: "Judge Administrator", role: "Fleet Manager" }));
                window.location.href = "dashboard.html";
                return;
            }

            // Locate account matches in local storage system
            if (!db.users) db.users = [];
            const matchedUser = db.users.find(u => u.email === email && u.password === password);

            if (matchedUser) {
                // Set temporary local active session configuration token 
                sessionStorage.setItem('currentUser', JSON.stringify({ name: matchedUser.name, role: matchedUser.role }));
                // Fire window location switch over to your main application console
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid email or password mismatch. Please verify credentials.");
            }
        });
    </script>
</body>
</html>
