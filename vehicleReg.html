<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifest — Fleet Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --primary-900:#042C53;
    --primary-800:#0C447C;
    --primary-600:#185FA5;
    --primary-400:#378ADD;
    --primary-50:#E6F1FB;
    --accent:#D85A30;
    --accent-light:#EF9F27;
    --neutral-900:#161B22;
    --neutral-700:#3D4551;
    --neutral-500:#6B7480;
    --neutral-300:#C9D1DB;
    --neutral-100:#F5F7FA;
    --white:#FFFFFF;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --radius-m:10px;
    --radius-l:16px;
  }

  *{box-sizing:border-box;}
  body{margin:0;padding:0;font-family:var(--font-body);background:var(--neutral-100);color:var(--neutral-900);}
  h1,h2{font-family:var(--font-display);}

  /* Top Bar + Navigation */
  .topbar{background:var(--primary-900);color:white;padding:18px 28px 0;}
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.15);}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand-mark{color:var(--accent-light);font-size:1.45rem;}
  .brand-name{font-weight:700;font-size:1.32rem;letter-spacing:0.5px;}

  .routes{display:flex;gap:8px;flex-wrap:wrap;}
  .route-tab{
    background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.85);
    padding:8px 16px;border-radius:999px;font-size:0.85rem;font-weight:600;
    cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;
  }
  .route-tab:hover{border-color:rgba(255,255,255,0.5);}
  .route-tab.active{
    background:var(--accent);border-color:var(--accent);color:white;
  }
  .route-tab .count{
    background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:999px;font-size:0.75rem;
  }

  /* Board */
  .board{
    background:var(--primary-900);
    display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));gap:1px;padding-top:1px;
  }
  .board-cell{background:var(--primary-900);padding:24px 20px;text-align:center;}
  .board-value{font-family:var(--font-mono);font-size:2.35rem;font-weight:600;color:#C9D1DB}

  .content{max-width:1280px;margin:0 auto;padding:28px 20px;}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px;}
  .search-wrap{position:relative;flex:1;min-width:280px;}
  #search{
    width:100%;padding:12px 16px 12px 48px;border:1px solid var(--neutral-300);
    border-radius:var(--radius-m);background:white;font-size:0.95rem;
  }
  .search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#777;}

  .btn-accent{
    background:var(--accent);color:white;padding:12px 22px;border:none;
    border-radius:8px;font-weight:600;cursor:pointer;
  }

  /* Table */
  .table-wrap{background:white;border-radius:var(--radius-l);overflow:hidden;box-shadow:0 4px 25px rgba(0,0,0,0.07);}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:14px 16px;text-align:left;}
  thead th{background:var(--primary-50);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--neutral-500);font-weight:700;}

  /* Modal */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(4,44,83,0.45);
    backdrop-filter:blur(10px);display:none;
    align-items:center;justify-content:center;z-index:1000;
  }
  .modal{
    background:white;border-radius:var(--radius-l);width:100%;max-width:520px;
    padding:28px;max-height:92vh;overflow-y:auto;
  }
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:0.8rem;font-weight:600;color:#444;display:block;margin-bottom:5px;}
  .field input,.field select{width:100%;padding:11px;border:1px solid #ccc;border-radius:6px;}

  .modal-actions{margin-top:24px;display:flex;gap:12px;justify-content:flex-end;}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">MANIFEST</span>
    </div>
    <nav class="routes" id="routes"></nav>
  </div>
</header>

<section class="board">
  <div class="board-cell"><span class="board-value"  id="stat-total">0</span><div> Total Fleet</div></div>
  <div class="board-cell"><span class="board-value" id="stat-onroad">0</span><div>On Road</div></div>
  <div class="board-cell"><span class="board-value" id="stat-loading">0</span><div>Loading</div></div>
  <div class="board-cell"><span class="board-value" id="stat-completed">0</span><div>Completed</div></div>
</section>

<main class="content">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search registration or name...">
    </div>
    <button class="btn-accent" id="add-btn">+ Add Vehicle</button>
  </div>

  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Registration</th>
          <th>Vehicle</th>
          <th>Type</th>
          <th>Region</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="vehicle-tbody"></tbody>
    </table>
  </div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2 id="modal-title">Add Vehicle</h2>
    
    <form id="vehicle-form">
      <div class="field-grid">
        <div class="field"><label>Registration Number</label><input id="f-regNumber" required></div>
        <div class="field"><label>Vehicle Name</label><input id="f-name" required></div>
        <div class="field"><label>Model</label><input id="f-model" required></div>
        
        <div class="field">
          <label>Type</label>
          <select id="f-type" required>
            <option value="">Select Type</option>
            <option value="Sedan">Sedan</option>
            <option value="SUV">SUV</option>
            <option value="Hatchback">Hatchback</option>
            <option value="Van">Van</option>
            <option value="Mini Bus">Mini Bus</option>
            <option value="Pickup Truck">Pickup Truck</option>
            <option value="Cargo Truck">Cargo Truck</option>
            <option value="Three-Wheeler">Three-Wheeler</option>
          </select>
        </div>

        <div class="field">
          <label>Region</label>
          <select id="f-region" required>
            <option value="">Select Region</option>
            <option value="India">India</option>
            <option value="South America">South America</option>
            <option value="Indonesia">Indonesia</option>
            <option value="Japan">Japan</option>
          </select>
        </div>

        <div class="field">
          <label>Status</label>
          <select id="f-status" required>
            <option value="On Road">On Road</option>
            <option value="Loading">Loading</option>
            <option value="Completed Journey">Completed Journey</option>
          </select>
        </div>

        <div class="field"><label>Max Load (kg)</label><input id="f-maxLoad" type="number" required></div>
        <div class="field"><label>Odometer (km)</label><input id="f-odometer" type="number" required></div>
        <div class="field full"><label>Acquisition Cost (USD)</label><input id="f-cost" type="number" required></div>
      </div>

      <div class="modal-actions">
        <button type="button" id="cancel-btn" style="padding:10px 22px;">Cancel</button>
        <button type="submit" style="background:#185FA5;color:white;padding:10px 24px;border:none;border-radius:6px;">Save Vehicle</button>
      </div>
    </form>
  </div>
</div>

<script>
let vehicles = [];
const STORAGE_KEY = 'manifest_vehicles';

const STATUSES = [
  { name: "All Routes", key: "ALL" },
  { name: "On Road", key: "On Road" },
  { name: "Loading", key: "Loading" },
  { name: "Completed Journey", key: "Completed Journey" }
];

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  vehicles = saved ? JSON.parse(saved) : seedVehicles();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(vehicles));
}

function seedVehicles() {
  return [
    {id:1, regNumber:"GJ01AB1234", name:"Ahmedabad Express", model:"Toyota Innova", type:"SUV", region:"India", maxLoad:450, odometer:48210, cost:24500, status:"On Road"},
    {id:2, regNumber:"MH12CD5678", name:"Pune Cargo", model:"Tata Ace", type:"Cargo Truck", region:"India", maxLoad:750, odometer:102340, cost:9800, status:"Loading"},
    {id:3, regNumber:"JP-TYO-4102", name:"Tokyo Precision", model:"Toyota Alphard", type:"Van", region:"Japan", maxLoad:600, odometer:39870, cost:41200, status:"Completed Journey"}
  ];
}

function getStatusCounts() {
  const counts = { "ALL": vehicles.length, "On Road": 0, "Loading": 0, "Completed Journey": 0 };
  vehicles.forEach(v => {
    if (counts[v.status] !== undefined) counts[v.status]++;
  });
  return counts;
}

function initNavigation() {
  const nav = document.getElementById('routes');
  const counts = getStatusCounts();

  nav.innerHTML = STATUSES.map(status => {
    const count = counts[status.key] || 0;
    return `
      <div class="route-tab ${status.key === 'ALL' ? 'active' : ''}" data-status="${status.key}">
        ${status.name} <span class="count">${count}</span>
      </div>
    `;
  }).join('');

  nav.addEventListener('click', (e) => {
    const tab = e.target.closest('.route-tab');
    if (!tab) return;
    
    document.querySelectorAll('.route-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    // Filtering can be added here later
  });
}

function render() {
  const tbody = document.getElementById('vehicle-tbody');
  tbody.innerHTML = vehicles.map(v => `
    <tr>
      <td>${v.regNumber}</td>
      <td>${v.name}<br><small>${v.model}</small></td>
      <td>${v.type}</td>
      <td>${v.region}</td>
      <td>${v.status}</td>
    </tr>
  `).join('');

  // Update board stats
  const counts = getStatusCounts();
  document.getElementById('stat-total').textContent = counts.ALL;
  document.getElementById('stat-onroad').textContent = counts["On Road"];
  document.getElementById('stat-loading').textContent = counts.Loading;
  document.getElementById('stat-completed').textContent = counts["Completed Journey"];

  // Refresh navigation counts
  initNavigation();
}

// Event Listeners
document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('modal-backdrop').style.display = 'flex';
});

document.getElementById('cancel-btn').addEventListener('click', () => {
  document.getElementById('modal-backdrop').style.display = 'none';
});

document.getElementById('modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modal-backdrop') document.getElementById('modal-backdrop').style.display = 'none';
});

document.getElementById('vehicle-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const newVehicle = {
    id: Date.now(),
    regNumber: document.getElementById('f-regNumber').value,
    name: document.getElementById('f-name').value,
    model: document.getElementById('f-model').value,
    type: document.getElementById('f-type').value,
    region: document.getElementById('f-region').value,
    maxLoad: Number(document.getElementById('f-maxLoad').value),
    odometer: Number(document.getElementById('f-odometer').value),
    cost: Number(document.getElementById('f-cost').value),
    status: document.getElementById('f-status').value
  };

  vehicles.push(newVehicle);
  saveData();
  render();
  document.getElementById('modal-backdrop').style.display = 'none';
});

// Initialize
loadData();
render();
</script>
</body>
</html>
